# dclint disable require-project-name-field
services:
  backup:
    image: b3vis/borgmatic:2.0.2-fix
    volumes:
      - webtop-config:/data/webtop
      - ssh:/root/.ssh/
    configs:
      - source: borgmatic-config-webtop
        target: /etc/borgmatic.d/config.yaml
    environment:
      - BORG_PASSPHRASE
      - BACKUP_CRON=0 1 * * * # Remove when https://github.com/borgmatic-collective/docker-borgmatic/issues/375 is fixed

  webtop:
    image: lscr.io/linuxserver/webtop
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - CUSTOM_USER=admin
      - PASSWORD
    volumes:
      - webtop-config:/config
      - type: tmpfs          # replaces shm_size (unsupported in swarm)
        target: /dev/shm
        tmpfs:
          size: 1073741824   # 1GB
    networks:
      - caddy
      - default
    labels:
      caddy: vps.colman.com.br
      caddy.reverse_proxy: "{{upstreams 3000}}"
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

networks:
  caddy:
    external: true

volumes:
  webtop-config:
  ssh:
    external: true

configs:
  borgmatic-config-webtop:
    external: true